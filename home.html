<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home</title>

    <!-- google fonts-->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&family=Outfit:wght@100..900&display=swap"
        rel="stylesheet">

    <!-- daisy -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- font Awosame -->

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">

    <style>
        * {
            background-color: #F8FAFC;
        }

        .geist {
            font-family: "Geist", sans-serif;
            font-optical-sizing: auto;
        }
    </style>
</head>

<body class="geist">
    <header class="mb-[60px] shadow rounded-md">
        <nav class="flex justify-between container mx-auto p-4 ">
            <div class="flex items-center gap-2">
                <img src="assets/github-logo.png" class="w-10 h-10" alt="">
                <h2 class="font-semibold">GitHub Issues Tracker</h2>
            </div>
            <!-- Search Section -->

            <label class="input">
                <svg class="h-[1em] opacity-50" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
                    <g stroke-linejoin="round" stroke-linecap="round" stroke-width="2.5" fill="none"
                        stroke="currentColor">
                        <circle cx="11" cy="11" r="8"></circle>
                        <path d="m21 21-4.3-4.3"></path>
                    </g>
                </svg>
                <input type="search" required placeholder="Search" />
            </label>
        </nav>
    </header>

    <!-- main -->
    <main>
        <!-- All button section -->
        <section class="w-11/12 mx-auto shadow-md p-8 bg-white mb-5">

            <!-- <button id="all-btn" onclick="setActive(this)" class="btn !bg-blue-600 text-white">All</button>
            <button id="open-btn" onclick="setActive(this)" class="btn bg-gray-200">Open</button>
            <button id="close-btn" onclick="setActive(this)" class="btn bg-gray-200">Closed</button> -->

             <button id="all-btn" onclick="filterIssues('all'); setActive(this)" class="btn !bg-blue-600 text-white">
            All
        </button>

        <button id="open-btn" onclick="filterIssues('open'); setActive(this)" class="btn bg-gray-200">
            Open
        </button>

        <button id="close-btn" onclick="filterIssues('closed'); setActive(this)" class="btn bg-gray-200">
            Closed
        </button>
        </section>

        <!-- status show -->
        <section id="statusCount" class="w-11/12 mx-auto p-6 shadow-lg flex justify-between">
            <div class="flex align-middle items-center gap-3">
                <img src="assets/Aperture.png" alt="">
                <h2 class="font-bold text-2xl"><span id="all-issu">0</span> Issues</h2>
            </div>

            <!-- OPEN CLOSE Indicator color -->

            <div class="flex gap-3 align-middle items-center">
                <div class="flex gap-2">
                    <div class="w-5 h-5 !bg-green-600 rounded-full"></div>
                    <h2 class="font-semibold">Open</h2>
                </div>
                <div class="flex gap-2">
                    <div class="w-5 h-5 !bg-purple-600 rounded-full"></div>
                    <h2 class="font-semibold">Closed</h2>
                </div>
            </div>

        </section>

        <!-- issue Container -->
        <section id="issue-container" class="w-11/12 mx-auto mt-3 grid md:grid-cols-3 gap-4">


        </section>

    </main>

    <script src="javaScript/card.js"></script>
</body>

</html>
