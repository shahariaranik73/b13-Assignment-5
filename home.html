<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home</title>

    <!-- google fonts-->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&family=Outfit:wght@100..900&display=swap"
        rel="stylesheet">

    <!-- daisy -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <style>
        * {
            background-color: #F8FAFC;
        }

        .geist {
            font-family: "Geist", sans-serif;
            font-optical-sizing: auto;
        }
    </style>
</head>

<body class="geist">
    <header class="mb-[60px] shadow rounded-md">
        <nav class="flex justify-between container mx-auto p-4 ">
            <div class="flex items-center gap-2">
                <img src="assets/github-logo.png" class="w-10 h-10" alt="">
                <h2 class="font-semibold">GitHub Issues Tracker</h2>
            </div>
            <!-- Search Section -->

            <label class="input">
                <svg class="h-[1em] opacity-50" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
                    <g stroke-linejoin="round" stroke-linecap="round" stroke-width="2.5" fill="none"
                        stroke="currentColor">
                        <circle cx="11" cy="11" r="8"></circle>
                        <path d="m21 21-4.3-4.3"></path>
                    </g>
                </svg>
                <input type="search" required placeholder="Search" />
            </label>
        </nav>
    </header>

    <!-- main -->
    <main>
        <!-- All button section -->
        <section class="w-11/12 mx-auto shadow-md p-8 bg-white mb-5">

            <button id="all-btn" class="btn btn-soft btn-primary hover:text-black">All</button>
            <button id="open-btn" class="btn btn-soft btn-primary hover:text-black">Open</button>
            <button id="close-btn" class="btn btn-soft btn-primary hover:text-black">Closed</button>

        </section>

        <!-- status show -->
        <section id="statusCount" class="w-11/12 mx-auto p-6 shadow-lg flex justify-between">
            <div class="flex align-middle items-center gap-3">
                <img src="assets/Aperture.png" alt="">
                <h2 class="font-bold text-2xl"><span id="all-issu">50</span> Issues</h2>
            </div>

            <!-- OPEN CLOSE Indicator color -->

            <div class="flex gap-3 align-middle items-center">
                <div class="flex gap-2">
                    <div class="w-5 h-5 !bg-green-600 rounded-full"></div>
                    <h2 class="font-semibold">Open</h2>
                </div>
                <div class="flex gap-2">
                    <div class="w-5 h-5 !bg-purple-600 rounded-full"></div>
                    <h2 class="font-semibold">Closed</h2>
                </div>
            </div>

        </section>

        <!-- issue Container -->
        <section id="issue-container" class="w-11/12 mx-auto mt-3 grid md:grid-cols-3 gap-4">

            <div class="space-y-4 p-4">
                <!-- priority head -->
                <div class="flex justify-end p-4"><span class="rounded-full border-2 border-amber-400 px-3 py-1">priority</span></div>

                <h2 class="text-2xl font-semibold">Title</h2>

                <p class="text[#64748B10]">Lorem ipsum dolor sit amet.</p>
                <div class="flex gap-2 mb-2.5">
                    <p class="!bg-amber-300 text-black rounded p-1 text-center">Hello </p>
                    <p class="!bg-amber-300 text-black rounded p-1 text-center">Hello </p>
                </div>
                <hr class="opacity-10">
                <!-- author info -->
                <div class="flex justify-between p-1">
                    <h3 class="opacity-70">Athor</h3>
                    <p class="opacity-70">createdAt</p>
                </div>
                <div class="flex justify-between p-1">
                    <h3 class="opacity-70">Assing</h3>
                    <p class="opacity-70">updatedAt</p>
                </div>
            </div>

        </section>

    </main>

    <script src="javaScript/card.js"></script>
</body>

</html>
